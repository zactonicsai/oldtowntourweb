# Tours API — nginx reverse proxy config.
#
# Layout:
#   /              → static files from /usr/share/nginx/html (bind-mounted web/)
#   /api/*         → upstream Go API at http://api:8080
#   /healthz       → upstream Go API (unauthenticated liveness probe)
#
# Upload streaming:
#   client_max_body_size is generous (matches the API's MAX_UPLOAD_MB=100).
#   proxy_request_buffering off makes nginx stream the request body
#   straight to the API instead of buffering it to a tmp file first —
#   important for video uploads.
#
# Playback:
#   proxy_buffering off on /api/media/ so Range requests and partial
#   responses stream cleanly to <audio>/<video> elements.

# Name the upstream so nginx can DNS-resolve it once per worker.
upstream tours_api {
    # docker compose service name resolves via the user-defined network.
    server api:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Match API's MAX_UPLOAD_MB default. Override with
    #   -v ./deploy/nginx.conf.prod:/etc/nginx/conf.d/default.conf:ro
    # if you tune the API upload limit differently.
    client_max_body_size 100m;

    # Be patient with large uploads/downloads. These apply to the whole
    # server; the /api/media/ block below further relaxes buffering.
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    client_body_timeout   300s;
    send_timeout          300s;

    # --- static admin console ---
    root /usr/share/nginx/html;
    index private.html index.html;

    # Small, sensible gzip for text assets. Media is already compressed.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- reverse proxy: the Go API ---
    location /api/ {
        proxy_pass         http://tours_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Stream uploads through instead of buffering to disk.
        proxy_request_buffering off;
    }

    # Media streaming: turn off response buffering so Range requests
    # and chunked audio/video playback don't wait for the full blob.
    # NOTE: the regex is quoted because nginx's config parser treats
    # bare `{` and `}` as block delimiters and chokes on `{32}`.
    location ~ "^/api/media/[0-9a-f]{32}$" {
        proxy_pass         http://tours_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_request_buffering off;
        proxy_buffering         off;
    }

    # Liveness probe: also proxied so `docker compose` health checks
    # (and external uptime monitors) can hit /healthz without an API key.
    location = /healthz {
        proxy_pass         http://tours_api/healthz;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Connection        "";
        access_log off;
    }

    # --- static files ---
    # Default root: /  serves /private.html (the admin console).
    location = / {
        try_files /private.html =404;
    }

    # Everything else falls through to static files on disk.
    # No try_files fallback to index.html — this isn't an SPA, so a
    # missing file is a real 404.
    location / {
        try_files $uri $uri/ =404;
    }

    # Don't leak nginx internals.
    server_tokens off;
}